<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brets-Dex</title>
  <link rel="icon" type="image/png" href="https://www.brets.fr/icon1.png?icon1.91ec1f22.png">
  <link rel="apple-touch-icon" href="https://www.brets.fr/apple-icon.png?apple-icon.9d26d7b7.png">
  <style>
    :root {
      color-scheme: light;
      --ink: #17130f;
      --muted: #6b6258;
      --paper: #fff7ea;
      --panel: #ffffff;
      --line: #221b14;
      --yellow: #ffd524;
      --red: #d62129;
      --green: #1c8a5c;
      --blue: #2364aa;
      --soft-shadow: 0 18px 45px rgba(54, 38, 20, .12);
      --ring: 0 0 0 4px rgba(255, 213, 36, .28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(rgba(255, 255, 255, .52) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .52) 1px, transparent 1px),
        radial-gradient(circle at 12% 8%, rgba(255, 213, 36, .32), transparent 22rem),
        radial-gradient(circle at 92% 5%, rgba(214, 33, 41, .18), transparent 23rem),
        linear-gradient(135deg, #fff7ea 0%, #ffe3ad 45%, #f5eee6 100%);
      background-size: 44px 44px, 44px 44px, auto, auto, auto;
    }

    button, input, select {
      font: inherit;
    }

    a {
      color: inherit;
    }

    .app {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      position: sticky;
      top: 14px;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: center;
      margin: 0 0 24px;
      padding: 16px;
      border: 1px solid rgba(34, 27, 20, .12);
      border-radius: 8px;
      background: rgba(255, 250, 242, .78);
      box-shadow: var(--soft-shadow);
      backdrop-filter: blur(18px) saturate(1.2);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }

    .logo {
      width: 112px;
      height: 64px;
      flex: 0 0 auto;
      padding: 7px;
      border: 1px solid rgba(34, 27, 20, .12);
      border-radius: 8px;
      background: rgba(255, 255, 255, .72);
      box-shadow: 0 10px 24px rgba(54, 38, 20, .12);
    }

    .logo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.7rem);
      line-height: .92;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-weight: 750;
    }

    .progressBox {
      min-width: 280px;
      padding: 14px;
      border: 1px solid rgba(34, 27, 20, .14);
      border-radius: 8px;
      background: rgba(255, 255, 255, .76);
      box-shadow: 0 10px 24px rgba(54, 38, 20, .1);
    }

    .progressLine {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 10px;
      font-weight: 900;
    }

    .bar {
      overflow: hidden;
      height: 16px;
      border: 1px solid rgba(34, 27, 20, .15);
      border-radius: 999px;
      background: #f0e3d2;
    }

    .bar span {
      display: block;
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--red), var(--yellow), var(--green));
      transition: width .25s ease;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(210px, 1.4fr) repeat(4, minmax(150px, .7fr));
      gap: 10px;
      align-items: end;
      margin-bottom: 16px;
      padding: 14px;
      border: 1px solid rgba(34, 27, 20, .1);
      border-radius: 8px;
      background: rgba(255, 255, 255, .58);
      box-shadow: 0 14px 34px rgba(54, 38, 20, .08);
      backdrop-filter: blur(10px);
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: .8rem;
      color: var(--muted);
      font-weight: 900;
      text-transform: uppercase;
    }

    input[type="search"], select {
      width: 100%;
      height: 46px;
      padding: 0 13px;
      border: 1px solid rgba(34, 27, 20, .16);
      border-radius: 8px;
      background: rgba(255, 255, 255, .88);
      color: var(--ink);
      box-shadow: 0 8px 18px rgba(54, 38, 20, .06);
      outline: none;
    }

    input[type="search"]:focus, select:focus {
      border-color: rgba(214, 33, 41, .35);
      box-shadow: var(--ring), 0 10px 24px rgba(54, 38, 20, .08);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .btn {
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid rgba(34, 27, 20, .18);
      border-radius: 8px;
      background: rgba(255, 255, 255, .86);
      color: var(--ink);
      box-shadow: 0 9px 20px rgba(54, 38, 20, .1);
      font-weight: 950;
      cursor: pointer;
      transition: transform .14s ease, box-shadow .14s ease, background .14s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(54, 38, 20, .14);
    }

    .btn.primary {
      background: var(--yellow);
    }

    .btn.danger {
      background: #ffebe8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 18px;
    }

    .card {
      position: relative;
      display: grid;
      min-height: 360px;
      padding: 12px;
      border: 1px solid rgba(34, 27, 20, .12);
      border-radius: 8px;
      background: rgba(255, 255, 255, .8);
      box-shadow: var(--soft-shadow);
      overflow: hidden;
      transition: transform .18s ease, filter .18s ease, box-shadow .18s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 24px 55px rgba(54, 38, 20, .17);
    }

    .card.owned {
      border-color: rgba(28, 138, 92, .34);
      background: linear-gradient(180deg, rgba(255, 255, 255, .92), rgba(239, 255, 247, .92));
    }

    .card.owned::after {
      content: "OK";
      position: absolute;
      top: 10px;
      right: 10px;
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(34, 27, 20, .2);
      border-radius: 50%;
      background: var(--green);
      color: white;
      font-weight: 950;
      box-shadow: 0 8px 18px rgba(28, 138, 92, .26);
    }

    .pack {
      display: grid;
      place-items: center;
      min-height: 185px;
      margin: -2px -2px 10px;
      border-radius: 6px;
      background:
        radial-gradient(circle at 50% 20%, rgba(255, 255, 255, .85), transparent 38%),
        linear-gradient(150deg, color-mix(in srgb, var(--accent), white 34%), white 76%);
    }

    .pack img {
      width: min(100%, 176px);
      aspect-ratio: 1;
      object-fit: contain;
      filter: drop-shadow(0 16px 16px rgba(0, 0, 0, .18));
      transition: transform .18s ease;
    }

    .card:hover .pack img {
      transform: scale(1.04) rotate(-1deg);
    }

    .meta {
      display: grid;
      gap: 8px;
    }

    .dexNo {
      color: var(--muted);
      font-size: .78rem;
      font-weight: 950;
      text-transform: uppercase;
    }

    .title {
      min-height: 48px;
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      min-height: 27px;
    }

    .tag {
      padding: 4px 7px;
      border: 1px solid rgba(34, 27, 20, .14);
      border-radius: 999px;
      background: rgba(255, 248, 236, .88);
      font-size: .72rem;
      font-weight: 850;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: .78rem;
      color: var(--muted);
      font-weight: 900;
    }

    .ownRow {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      margin-top: auto;
      padding-top: 12px;
    }

    .check {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      font-weight: 950;
      cursor: pointer;
      user-select: none;
    }

    .check input {
      width: 24px;
      height: 24px;
      accent-color: var(--green);
      cursor: pointer;
    }

    .open {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(34, 27, 20, .14);
      border-radius: 8px;
      background: var(--yellow);
      box-shadow: 0 8px 16px rgba(54, 38, 20, .12);
      text-decoration: none;
      font-weight: 950;
    }

    .empty {
      display: none;
      padding: 28px;
      border: 1px dashed rgba(34, 27, 20, .28);
      border-radius: 8px;
      background: rgba(255, 255, 255, .66);
      text-align: center;
      font-weight: 900;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 8px;
      background: var(--ink);
      color: white;
      box-shadow: 0 18px 40px rgba(0, 0, 0, .2);
      font-weight: 900;
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 960px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .controls {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      .app {
        padding: 14px;
      }

      .topbar {
        top: 8px;
        margin: 0 0 16px;
        padding: 14px;
      }

      .brand {
        align-items: flex-start;
      }

      .logo {
        width: 88px;
        height: 52px;
        padding: 6px;
      }

      .subtitle {
        font-size: .9rem;
      }

      .progressBox {
        min-width: 0;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
        gap: 12px;
      }

      .card {
        min-height: 342px;
        padding: 10px;
      }

      .pack {
        min-height: 158px;
      }

      .pack img {
        width: min(100%, 148px);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <section class="brand" aria-label="Brets-Dex">
        <div class="logo">
          <img src="https://www.brets.fr/_next/static/media/logo-background.9ea351f0.png" alt="Logo Bret's">
        </div>
        <div>
          <h1>Brets-Dex</h1>
          <p class="subtitle">Le Pokédex croustillant des chips Bret's</p>
        </div>
      </section>
      <section class="progressBox" aria-label="Progression">
        <div class="progressLine">
          <span id="ownedText">0 / 0 cochées</span>
          <span id="percentText">0%</span>
        </div>
        <div class="bar" aria-hidden="true"><span id="progressBar"></span></div>
      </section>
    </header>

    <section class="controls" aria-label="Filtres">
      <div class="field">
        <label for="search">Recherche</label>
        <input id="search" type="search" placeholder="Nom, gamme, type...">
      </div>
      <div class="field">
        <label for="statusFilter">Statut</label>
        <select id="statusFilter">
          <option value="all">Toutes</option>
          <option value="owned">Déjà cochées</option>
          <option value="missing">Pas encore</option>
        </select>
      </div>
      <div class="field">
        <label for="rangeFilter">Gamme</label>
        <select id="rangeFilter"></select>
      </div>
      <div class="field">
        <label for="typeFilter">Texture</label>
        <select id="typeFilter"></select>
      </div>
      <div class="field">
        <label for="sortBy">Tri</label>
        <select id="sortBy">
          <option value="name">Nom A-Z</option>
          <option value="owned">Cochées d'abord</option>
          <option value="missing">Manquantes d'abord</option>
          <option value="spice">Piquant</option>
          <option value="originality">Originalité</option>
        </select>
      </div>
    </section>

    <section class="actions" aria-label="Actions">
      <button class="btn primary" id="checkVisible" type="button">Cocher visibles</button>
      <button class="btn" id="uncheckVisible" type="button">Décocher visibles</button>
      <button class="btn danger" id="resetAll" type="button">Tout remettre à zéro</button>
    </section>

    <section class="grid" id="grid" aria-live="polite"></section>
    <p class="empty" id="empty">Aucune chips ne correspond aux filtres.</p>
  </main>
  <div class="toast" id="toast" role="status" aria-live="polite">Sauvegardé</div>

      {"id":517,"slug":"bacon-grille","title":"Bacon Grillé","link":"https://www.brets.fr/fr/chips/bacon-grille","image":"https://cms.brets.fr/app/uploads/2026/01/bacon-grille.png","ranges":["Les viandes et grillades"],"type":"wavy","spice":3,"originality":6,"nutriscore":"C","color":"#B83A4B"},
      {"id":513,"slug":"aioli","title":"Aïoli","link":"https://www.brets.fr/fr/chips/aioli","image":"https://cms.brets.fr/app/uploads/2026/01/aioli.png","ranges":["Les méditerranéennes"],"type":"wavy","spice":3,"originality":6,"nutriscore":"C","color":"#C6A1CF"},
      {"id":411,"slug":"kebab","title":"Kebab","link":"https://www.brets.fr/fr/chips/kebab","image":"https://cms.brets.fr/app/uploads/2025/12/brets-kebab-125g-recto-1.png","ranges":["Les saveurs du monde","Les viandes et grillades"],"type":"wavy","spice":3,"originality":10,"nutriscore":"C","color":"#7E5475"}
    ];

    const TYPE_LABELS = {
      buckwheat: "Sarrasin",
      crepe: "Chips de crêpes",
      extrawavy: "Très ondulée",
      smooth: "Lisse",
      socrack: "So Crack",
      wavy: "Ondulée"
    };

    const storageKey = "brets-dex-owned-v1";
    const grid = document.querySelector("#grid");
    const empty = document.querySelector("#empty");
    const search = document.querySelector("#search");
    const statusFilter = document.querySelector("#statusFilter");
    const rangeFilter = document.querySelector("#rangeFilter");
    const typeFilter = document.querySelector("#typeFilter");
    const sortBy = document.querySelector("#sortBy");
    const ownedText = document.querySelector("#ownedText");
    const percentText = document.querySelector("#percentText");
    const progressBar = document.querySelector("#progressBar");
    const toast = document.querySelector("#toast");
    let visibleProducts = [];
    let toastTimer;

    const loadOwned = () => {
      try {
        return new Set(JSON.parse(localStorage.getItem(storageKey) || "[]"));
      } catch {
        return new Set();
      }
    };

    let owned = loadOwned();

    const saveOwned = (quiet = false) => {
      localStorage.setItem(storageKey, JSON.stringify([...owned]));
      updateProgress();
      if (!quiet) showToast();
    };

    const showToast = () => {
      clearTimeout(toastTimer);
      toast.classList.add("show");
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1100);
    };

    const normalize = (value) => value.toLocaleLowerCase("fr-FR").normalize("NFD").replace(/\p{Diacritic}/gu, "");

    const setupFilters = () => {
      const ranges = [...new Set(PRODUCTS.flatMap(product => product.ranges))].sort((a, b) => a.localeCompare(b, "fr"));
      rangeFilter.innerHTML = `<option value="all">Toutes</option>${ranges.map(range => `<option value="${range}">${range}</option>`).join("")}`;

      const types = [...new Set(PRODUCTS.map(product => product.type))].sort();
      typeFilter.innerHTML = `<option value="all">Toutes</option>${types.map(type => `<option value="${type}">${TYPE_LABELS[type] || type}</option>`).join("")}`;
    };

    const matchesFilters = (product) => {
      const query = normalize(search.value.trim());
      const haystack = normalize([product.title, product.slug, product.type, ...product.ranges].join(" "));
      const status = statusFilter.value;
      const has = owned.has(product.id);

      return (!query || haystack.includes(query))
        && (status === "all" || (status === "owned" && has) || (status === "missing" && !has))
        && (rangeFilter.value === "all" || product.ranges.includes(rangeFilter.value))
        && (typeFilter.value === "all" || product.type === typeFilter.value);
    };

    const sortedProducts = (products) => {
      const list = [...products];
      const selectedSort = sortBy.value;
      list.sort((a, b) => {
        if (selectedSort === "owned") return Number(owned.has(b.id)) - Number(owned.has(a.id)) || a.title.localeCompare(b.title, "fr");
        if (selectedSort === "missing") return Number(owned.has(a.id)) - Number(owned.has(b.id)) || a.title.localeCompare(b.title, "fr");
        if (selectedSort === "spice") return b.spice - a.spice || a.title.localeCompare(b.title, "fr");
        if (selectedSort === "originality") return b.originality - a.originality || a.title.localeCompare(b.title, "fr");
        return a.title.localeCompare(b.title, "fr");
      });
      return list;
    };

    const render = () => {
      visibleProducts = sortedProducts(PRODUCTS.filter(matchesFilters));
      grid.innerHTML = visibleProducts.map((product, index) => {
        const checked = owned.has(product.id);
        const tags = product.ranges.slice(0, 2).map(range => `<span class="tag">${range}</span>`).join("");
        return `
          <article class="card ${checked ? "owned" : ""}" style="--accent:${product.color}">
            <div class="pack">
              <img src="${product.image}" alt="Paquet Bret's ${product.title}" loading="lazy">
            </div>
            <div class="meta">
              <span class="dexNo">#${String(index + 1).padStart(3, "0")} · ${TYPE_LABELS[product.type] || product.type} · Nutri ${product.nutriscore || "?"}</span>
              <h2 class="title">${product.title}</h2>
              <div class="tags">${tags}</div>
              <div class="stats">
                <span>Piquant ${product.spice}/10</span>
                <span>Originalité ${product.originality}/10</span>
              </div>
            </div>
            <div class="ownRow">
              <label class="check">
                <input type="checkbox" data-id="${product.id}" ${checked ? "checked" : ""}>
                Je l'ai
              </label>
              <a class="open" href="${product.link}" target="_blank" rel="noopener" aria-label="Voir ${product.title} sur Brets">↗</a>
            </div>
          </article>
        `;
      }).join("");
      empty.style.display = visibleProducts.length ? "none" : "block";
      updateProgress();
    };

    const updateProgress = () => {
      const count = PRODUCTS.filter(product => owned.has(product.id)).length;
      const percent = Math.round((count / PRODUCTS.length) * 100);
      ownedText.textContent = `${count} / ${PRODUCTS.length} cochées`;
      percentText.textContent = `${percent}%`;
      progressBar.style.width = `${percent}%`;
    };

    grid.addEventListener("change", (event) => {
      const input = event.target.closest("input[type='checkbox'][data-id]");
      if (!input) return;
      const id = Number(input.dataset.id);
      if (input.checked) owned.add(id);
      else owned.delete(id);
      saveOwned();
      render();
    });

    [search, statusFilter, rangeFilter, typeFilter, sortBy].forEach(control => {
      control.addEventListener("input", render);
      control.addEventListener("change", render);
    });

    document.querySelector("#checkVisible").addEventListener("click", () => {
      visibleProducts.forEach(product => owned.add(product.id));
      saveOwned();
      render();
    });

    document.querySelector("#uncheckVisible").addEventListener("click", () => {
      visibleProducts.forEach(product => owned.delete(product.id));
      saveOwned();
      render();
    });

    document.querySelector("#resetAll").addEventListener("click", () => {
      if (!confirm("Remettre tout le Brets-Dex à zéro ?")) return;
      owned = new Set();
      saveOwned();
      render();
    });

    setupFilters();
    render();
  </script>
